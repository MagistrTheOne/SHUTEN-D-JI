# SHUTEN-DŌJI Mini — Development/Debug Configuration
# Scaled-down version for local testing and architecture validation
# Team: NULLXES DAI

model_name: "shuten-doji-mini"
model_type: "custom_moe"

architecture:
  hidden_size: 1024
  intermediate_size: 2816
  num_layers: 12
  vocab_size: 32000

  # Attention (GQA)
  num_attention_heads: 16
  num_kv_heads: 4
  head_dim: 64
  max_position_embeddings: 8192
  rope_theta: 500000.0

  # MoE
  num_experts: 16
  num_shared_experts: 1
  num_experts_per_token: 4
  expert_hidden_size: 512
  router_aux_loss_coef: 0.01
  router_z_loss_coef: 0.001
  num_dense_layers: 1

  # Memory
  num_memory_slots: 32
  memory_dim: 256

  # Token types
  num_token_types: 9

  # Norms
  rms_norm_eps: 1.0e-6
  initializer_range: 0.02
  tie_word_embeddings: false

# Estimated parameters
estimates:
  total_params: "~1.2B"
  active_params: "~400M"
  purpose: "Architecture validation, unit tests, data pipeline testing"
