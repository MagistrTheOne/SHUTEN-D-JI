### SHUTEN SFT v2.1 — continue LoRA v2, 1 epoch polish

### Model
model_name_or_path: /workspace/models/qwen3.6-27b
adapter_name_or_path: /workspace/outputs/shuten-sft-27b-v2
trust_remote_code: true

### Method — QLoRA (resume)
stage: sft
do_train: true
finetuning_type: lora
quantization_bit: 4
quantization_method: bitsandbytes
double_quantization: true
quantization_type: nf4
lora_rank: 32
lora_alpha: 64
lora_dropout: 0.05
lora_target: q_proj,k_proj,v_proj,o_proj

### Dataset
dataset_dir: /workspace/SHUTEN-D-JI/data/trajectories
dataset: shuten_sft_train
eval_dataset: shuten_sft_eval
template: qwen3
cutoff_len: 512
overwrite_cache: true
preprocessing_num_workers: 4

### Training
per_device_train_batch_size: 1
gradient_accumulation_steps: 8
learning_rate: 5.0e-5
num_train_epochs: 1
lr_scheduler_type: cosine
warmup_ratio: 0.03
weight_decay: 0.01
max_grad_norm: 1.0

### Precision
bf16: true

### Evaluation
per_device_eval_batch_size: 1
eval_strategy: epoch

### Saving
save_strategy: epoch
save_total_limit: 1
output_dir: /workspace/outputs/shuten-sft-27b-v2.1

### Logging
logging_steps: 5
report_to: none

### Optimization
gradient_checkpointing: true
flash_attn: disabled
