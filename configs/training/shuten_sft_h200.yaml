### SHUTEN SFT — Qwen3.5-122B-A10B QLoRA on 1x H200 (141GB)
### bitsandbytes 4-bit — no GPTQ/Marlin

### Model
model_name_or_path: /workspace/models/qwen3.5-122b
trust_remote_code: true

### Method — QLoRA
stage: sft
do_train: true
finetuning_type: lora
quantization_bit: 4
quantization_method: bitsandbytes
double_quantization: true
quantization_type: nf4
lora_rank: 64
lora_alpha: 128
lora_dropout: 0.05
lora_target: q_proj,k_proj,v_proj,o_proj

### Dataset
dataset_dir: /workspace/SHUTEN-D-JI/data/trajectories
dataset: shuten_sft_train
eval_dataset: shuten_sft_eval
template: qwen3
cutoff_len: 8192
overwrite_cache: true
preprocessing_num_workers: 4

### Training
per_device_train_batch_size: 1
gradient_accumulation_steps: 16
learning_rate: 2.0e-4
num_train_epochs: 3
lr_scheduler_type: cosine
warmup_ratio: 0.05
weight_decay: 0.01
max_grad_norm: 1.0

### Precision — bf16 on H200
bf16: true

### Evaluation
per_device_eval_batch_size: 1
eval_strategy: steps
eval_steps: 50

### Saving
save_strategy: steps
save_steps: 100
save_total_limit: 5
output_dir: /workspace/outputs/shuten-sft

### Logging
logging_steps: 10
report_to: none

### Optimization
gradient_checkpointing: true
flash_attn: disabled
