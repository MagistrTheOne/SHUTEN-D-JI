# Phase 4: PPO Reinforcement Learning via LLaMA Factory
# SHUTEN-DŌJI | NULLXES DAI
#
# Objective: RLVR — optimize planning/prediction using verifiable rewards
# from environment outcomes.
#
# Usage: llamafactory-cli train configs/training/phase4_ppo.yaml

### Model ###
model_name_or_path: ./checkpoints/shuten-doji-base
adapter_name_or_path: outputs/phase3_dpo  # load Phase 3 LoRA
trust_remote_code: true
reward_model: outputs/reward_model  # trained reward model from evaluator

### Method ###
stage: ppo
do_train: true
finetuning_type: lora

### LoRA ###
lora_rank: 32
lora_alpha: 64
lora_dropout: 0.05
lora_target: all

### Dataset ###
dataset: shuten_rl_prompts
dataset_dir: data/trajectories/llamafactory_export
template: llama3
cutoff_len: 8192
overwrite_cache: true
preprocessing_num_workers: 8

### PPO Config ###
ppo_epochs: 4
top_k: 0
top_p: 0.9
temperature: 0.8  # starts high for exploration

### Training ###
output_dir: outputs/phase4_ppo
logging_steps: 5
save_steps: 100
save_total_limit: 3
per_device_train_batch_size: 1
gradient_accumulation_steps: 8
learning_rate: 5.0e-6
num_train_epochs: 1.0
bf16: true
gradient_checkpointing: true

### Generation ###
max_new_tokens: 4096
