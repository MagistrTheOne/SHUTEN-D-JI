# Phase 2: Tool-Use Learning via LLaMA Factory
# SHUTEN-DŌJI | NULLXES DAI
#
# Objective: Teach model to interact with tools (data lookup, simulation, etc.)
# Builds on Phase 1 checkpoint.
#
# Usage: llamafactory-cli train configs/training/phase2_tools.yaml

### Model ###
model_name_or_path: ./checkpoints/shuten-doji-base
adapter_name_or_path: outputs/phase1_sft  # load Phase 1 LoRA
trust_remote_code: true

### Method ###
stage: sft
do_train: true
finetuning_type: lora

### LoRA ###
lora_rank: 64
lora_alpha: 128
lora_dropout: 0.05
lora_target: all

### Dataset ###
dataset: shuten_tools_demonstrations,shuten_tools_multiturn
dataset_dir: data/trajectories/llamafactory_export
template: llama3
cutoff_len: 16384  # longer context for multi-tool interactions
overwrite_cache: true
preprocessing_num_workers: 16

### Training ###
output_dir: outputs/phase2_tools
logging_steps: 10
save_steps: 500
save_total_limit: 3
per_device_train_batch_size: 1
gradient_accumulation_steps: 16
learning_rate: 3.0e-5
num_train_epochs: 2.0
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
gradient_checkpointing: true

### Evaluation ###
val_size: 0.02
per_device_eval_batch_size: 2
eval_strategy: steps
eval_steps: 500
