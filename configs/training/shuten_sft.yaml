### SHUTEN SFT — Qwen3-235B-A22B-GPTQ on 3xA100
### GPTQ + LoRA: NO DeepSpeed (ZeRO-3/FSDP incompatible with PTQ)
### Use scripts/train_sft.sh → train_sft_gptq.py (single-process device_map auto)

### Model
model_name_or_path: /workspace/models/qwen3-235b-gptq
trust_remote_code: true

### Method — QLoRA
stage: sft
do_train: true
finetuning_type: lora
lora_rank: 64
lora_alpha: 128
lora_dropout: 0.05
lora_target: all

### Dataset
dataset_dir: /workspace/SHUTEN-D-JI/data/trajectories
dataset: shuten_sft_train
eval_dataset: shuten_sft_eval
template: qwen3
cutoff_len: 8192
overwrite_cache: true
preprocessing_num_workers: 8

### Training
per_device_train_batch_size: 1
gradient_accumulation_steps: 16
learning_rate: 2.0e-4
num_train_epochs: 3
lr_scheduler_type: cosine
warmup_ratio: 0.05
weight_decay: 0.01
max_grad_norm: 1.0

### Precision — fp16 for GPTQ MoE (bf16 can hit rshift_cuda errors)
fp16: true

### Evaluation
per_device_eval_batch_size: 1
eval_strategy: steps
eval_steps: 50

### Saving
save_strategy: steps
save_steps: 100
save_total_limit: 5
output_dir: /workspace/outputs/shuten-sft

### Logging
logging_steps: 10
report_to: none

### Optimization
gradient_checkpointing: true
flash_attn: fa2
